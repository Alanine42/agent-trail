<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #e0e0e0;
      font-size: 13px;
      line-height: 1.5;
    }

    .header {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 700;
      color: rgba(255, 213, 79, 0.9);
    }

    .header .count {
      font-size: 11px;
      color: #666;
    }

    .search {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .search input {
      width: 100%;
      padding: 8px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }

    .search input:focus {
      border-color: rgba(255, 213, 79, 0.4);
    }

    .search input::placeholder {
      color: #555;
    }

    .filters {
      padding: 8px 16px;
      display: flex;
      gap: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .filter-btn {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: #999;
      cursor: pointer;
      transition: all 0.1s ease;
    }

    .filter-btn:hover { color: #ccc; border-color: rgba(255,255,255,0.24); }
    .filter-btn.active {
      background: rgba(255, 213, 79, 0.15);
      color: rgba(255, 213, 79, 0.9);
      border-color: rgba(255, 213, 79, 0.3);
    }

    .annotations {
      overflow-y: auto;
      max-height: calc(100vh - 140px);
    }

    .anno-card {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
      transition: background 0.1s ease;
    }

    .anno-card:hover {
      background: rgba(255,255,255,0.03);
    }

    .anno-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .anno-author {
      font-size: 11px;
      font-weight: 600;
      color: #999;
    }

    .anno-date {
      font-size: 10px;
      color: #555;
    }

    .anno-text {
      color: rgba(255, 213, 79, 0.8);
      font-size: 12px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 4px;
    }

    .anno-comment {
      font-size: 12px;
      color: #bbb;
      font-style: italic;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .anno-source {
      font-size: 10px;
      color: #555;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .anno-type {
      display: inline-block;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      margin-left: 6px;
      background: rgba(91, 155, 213, 0.15);
      color: rgba(91, 155, 213, 0.8);
    }

    .empty {
      padding: 40px 16px;
      text-align: center;
      color: #555;
    }

    .empty .icon { font-size: 32px; margin-bottom: 8px; }
    .empty p { margin-top: 8px; font-size: 12px; }

    .status {
      padding: 8px 16px;
      font-size: 10px;
      color: #444;
      text-align: center;
    }

    .status.error { color: #E05252; }
    .status.ok { color: #4CAF50; }
  </style>
</head>
<body>
  <div class="header">
    <h1>✦ Trailmark</h1>
    <span class="count" id="count"></span>
  </div>

  <div class="search">
    <input type="text" id="search" placeholder="Search annotations..." />
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="human">👤 Mine</button>
    <button class="filter-btn" data-filter="agent">🤖 Agent</button>
  </div>

  <div class="annotations" id="annotations"></div>
  <div class="status" id="status"></div>

  <script src="sidepanel.js"></script>
</body>
</html>
